apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detector
  namespace: aiops
  labels:
    app: anomaly-detector
    component: aiops-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-detector
  template:
    metadata:
      labels:
        app: anomaly-detector
        component: aiops-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: anomaly-detector
        image: aiops-anomaly-detector:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PROMETHEUS_URL
          value: "http://prometheus-server.aiops.svc.cluster.local"
        - name: CHECK_INTERVAL
          value: "30"
        - name: LOOKBACK_MINUTES
          value: "10"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-detector-service
  namespace: aiops
  labels:
    app: anomaly-detector
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: anomaly-detector
  ports:
  - name: http
    port: 80
    targetPort: 8000
